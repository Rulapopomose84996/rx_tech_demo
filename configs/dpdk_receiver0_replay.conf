# ============================================================
# DPDK Receiver0 Replay 配置文件
# ============================================================
# 此配置文件用于定义基于 DPDK 的数据包接收和重放测试场景
# 包含后端类型、输出路径、网络接口和 DPDK 相关参数配置

# 后端处理引擎类型
backend: dpdk

[capture]
# 测试结果输出目录路径
enabled = true
output_dir = results/dpdk_receiver0_replay
index_filename = capture_index.csv
data_filename = capture_packets.bin

[network]
# 网络接口标识名称
interface_name = receiver0
queue_id = 0

# 接收端绑定的业务 IP
receiver_ipv4 = 172.20.11.100
allowed_source_ipv4 = 172.20.11.222
allowed_dest_port = 9999

[dpdk]
# DPDK PCI 设备地址 (格式：域：总线：设备。功能)
pci_addr = 0001:05:00.0

# DPDK 端口标识符 (0 表示第一个端口)
port_id = 0

# DPDK Socket 内存分配大小（兆字节）
# 用于 NUMA 架构下的内存优化
socket_mem_mb = 1024

# DPDK 内存池大小（元素数量）
# 预分配的内存对象数量，用于存储 mbuf
mempool_size = 4096

# DPDK mbuf 缓存大小（每个缓存的元素数）
# 每核本地缓存的 mbuf 数量，减少锁竞争
mbuf_cache_size = 256

# DPDK 接收描述符数量（环形缓冲区大小）
# 网卡接收队列的描述符条目数
rx_desc = 256

# DPDK 发送描述符数量（环形缓冲区大小）
# 网卡发送队列的描述符条目数
tx_desc = 256

[runtime]
# 测试持续时间（秒）
duration_seconds = 10

# 最大突发传输包数量（单次批量处理的包数上限）
max_burst = 64

# CPU 核心绑定列表
# 指定用于数据包处理的核心编号，此处使用核心 16
cpu_cores = [16]

# 是否持续接收直到手工停止
run_until_stopped = false

# 状态面板刷新周期（秒）
status_interval_seconds = 1

[protocol]
udp_packet_size = 2048
channels_per_prt = 3
packets_per_channel = 9

[log]
level = info
output = stdout

[feedback]
enabled = false
interval_seconds = 1
