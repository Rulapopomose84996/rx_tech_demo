# DPDK 数据包捕获配置文件
# 后端类型：DPDK (Data Plane Development Kit) 高性能数据包处理
backend: dpdk

# ============================================
# 数据包捕获模块配置
# ============================================
[capture]
# 启用或禁用数据包捕获功能
enabled = true
# 捕获结果的输出目录路径
output_dir = results/dpdk_single_face
# 捕获索引文件的文件名，用于存储元数据信息
index_filename = capture_index.csv
# 原始数据包数据的二进制文件名
data_filename = capture_packets.bin

# ============================================
# 网络接口配置
# ============================================
[network]
# 网络接收接口的名称标识
interface_name = receiver0
# DPDK 接收队列的 ID 编号
queue_id = 0
# 接收端的 IPv4 地址配置
receiver_ipv4 = 172.20.11.100
# 允许接收的数据源 IPv4 地址（白名单）
allowed_source_ipv4 = 172.20.11.222
# 允许接收的目标 UDP 端口号
allowed_dest_port = 9999

# ============================================
# DPDK 底层配置
# ============================================
[dpdk]
# PCI 设备地址，用于绑定网卡到 DPDK 驱动
pci_addr = 0001:05:00.0
# DPDK 端口 ID 标识符
port_id = 0
# NUMA socket 内存分配大小（单位：MB）
socket_mem_mb = 1024
# 内存池大小，预分配的数据包缓冲区数量
mempool_size = 4096
# mbuf 缓存大小，用于快速分配释放数据包缓冲区
mbuf_cache_size = 256
# 接收描述符环形缓冲区的大小
rx_desc = 256
# 发送描述符环形缓冲区的大小
tx_desc = 256

# ============================================
# 运行时参数配置
# ============================================
[runtime]
# 数据包捕获的持续时间（单位：秒）
duration_seconds = 30
# 每次批量处理的最大数据包数量（burst size）
max_burst = 64
# 绑定的 CPU 核心编号列表，用于轮询模式处理
cpu_cores = [16,17]
# 是否持续接收直到手工停止
run_until_stopped = false
# 状态面板刷新周期（单位：秒）
status_interval_seconds = 1

# ============================================
# 协议层配置
# ============================================
[protocol]
# UDP 数据包的有效载荷大小（单位：字节）
udp_packet_size = 2048
# 每个端口支持的通道数量
channels_per_prt = 3
# 每个通道包含的数据包数量
packets_per_channel = 9

# ============================================
# 日志系统配置
# ============================================
[log]
# 日志级别：debug/info/warn/error
level = info
# 日志输出目标：stdout/file/syslog
output = stdout

# ============================================
# 反馈机制配置
# ============================================
[feedback]
# 启用或禁用状态反馈功能
enabled = false
# 反馈信息的发送间隔时间（单位：秒）
interval_seconds = 1
