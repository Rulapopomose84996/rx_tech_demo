backend: socket

[capture]
output_dir = results/socket_receiver0_sender0
enabled = true
index_filename = capture_index.csv
data_filename = capture_packets.bin

[network]
receiver_ipv4 = 172.20.11.100
allowed_source_ipv4 = 172.20.11.11
allowed_dest_port = 9999

[socket]
bind_ip = 172.20.11.100
bind_port = 9999
rcvbuf_bytes = 8388608
batch_timeout_ms = 10

[runtime]
duration_seconds = 30
max_burst = 32
status_interval_seconds = 1

[protocol]
udp_packet_size = 2048
channels_per_prt = 3
packets_per_channel = 9

[log]
level = info
output = stdout
